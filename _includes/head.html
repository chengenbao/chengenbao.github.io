<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
:root{--sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'JetBrains Mono','Fira Code',Consolas,monospace;--bg:#fafafa;--surface:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--accent:#4f46e5;--accent-bg:#eef2ff;--accent-h:#4338ca;--tag-bg:#f3f4f6;--tag-text:#374151;--r:8px;--rl:12px;--max:780px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);font-size:16px;line-height:1.75;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
.container{max-width:var(--max);margin:0 auto;padding:0 24px}
.main-content{min-height:calc(100vh - 64px - 80px);padding:48px 0 64px}
.site-header{height:64px;background:#fff;border-bottom:1px solid var(--border);position:relative;z-index:100}
.site-header .container{height:100%;display:flex;align-items:center;justify-content:space-between}
.site-title{font-size:18px;font-weight:600;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.site-title:hover{color:var(--accent)}
.site-nav{display:flex;gap:4px}
.site-nav a{font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:var(--r);transition:all .15s}
.site-nav a:hover,.site-nav a.active{color:var(--accent);background:var(--accent-bg)}
.hero{padding:48px 0 40px;border-bottom:1px solid var(--border);margin-bottom:40px}
.hero h1{font-size:36px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px;line-height:1.2}
.hero .amp{color:var(--accent)}
.hero p{font-size:16px;color:var(--muted);max-width:480px}
.posts-list{display:flex;flex-direction:column}
.post-item{padding:28px 0;border-bottom:1px solid var(--border)}
.post-item:last-child{border-bottom:none}
.post-item h2{font-size:20px;font-weight:600;margin-bottom:8px;line-height:1.35;letter-spacing:-.2px}
.post-item h2 a{color:var(--text);text-decoration:none;transition:color .15s}
.post-item h2 a:hover{color:var(--accent)}
.post-meta{font-size:13px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag,.category{display:inline-block;padding:2px 8px;background:var(--tag-bg);color:var(--tag-text);border-radius:4px;font-size:12px;font-weight:500}
.post-excerpt{font-size:14px;color:var(--muted);line-height:1.6}
.pagination{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:48px;font-size:14px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);text-decoration:none;font-size:14px;font-weight:500;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.post-header{padding-bottom:32px;border-bottom:1px solid var(--border);margin-bottom:40px}
.post-title{font-size:32px;font-weight:700;letter-spacing:-.5px;line-height:1.25;margin-bottom:16px}
.post-content{font-size:16px;line-height:1.8}
.post-content h1,.post-content h2,.post-content h3,.post-content h4{font-weight:600;letter-spacing:-.3px;margin-top:2em;margin-bottom:.6em;line-height:1.3}
.post-content h1{font-size:28px}
.post-content h2{font-size:22px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.post-content h3{font-size:18px}
.post-content h4{font-size:16px;color:var(--muted)}
.post-content p{margin-bottom:1.25em}
.post-content a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.post-content a:hover{color:var(--accent-h)}
.post-content ul,.post-content ol{margin:0 0 1.25em 1.5em}
.post-content li{margin-bottom:.4em}
.post-content blockquote{margin:1.5em 0;padding:16px 20px;border-left:3px solid var(--accent);background:var(--accent-bg);border-radius:0 var(--r) var(--r) 0;color:var(--muted);font-style:italic}
.post-content code{font-family:var(--mono);font-size:.875em;background:#f1f5f9;padding:2px 6px;border-radius:4px;color:#e11d48}
.post-content pre{margin:1.5em 0;padding:20px 24px;background:#1e1e2e;border-radius:var(--rl);overflow-x:auto;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.post-content pre code{font-family:var(--mono);font-size:14px;background:none;padding:0;color:#cdd6f4;line-height:1.6}
.post-content img{max-width:100%;border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,.08);margin:1.5em 0}
.post-content table{width:100%;border-collapse:collapse;margin:1.5em 0;font-size:14px}
.post-content th,.post-content td{padding:10px 14px;border:1px solid var(--border);text-align:left}
.post-content th{background:var(--tag-bg);font-weight:600}
.post-content tr:hover td{background:#f9fafb}
.post-nav{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:14px;gap:16px}
.post-nav a{color:var(--accent);text-decoration:none;font-weight:500}
.post-nav a:hover{text-decoration:underline}
.post-nav .next{margin-left:auto}
.site-footer{border-top:1px solid var(--border);padding:24px 0;text-align:center;font-size:13px;color:var(--muted)}
.site-footer a{color:var(--muted);text-decoration:none}
.site-footer a:hover{color:var(--accent)}
@media(max-width:640px){.hero h1{font-size:28px}.post-title{font-size:24px}.site-nav a{padding:6px 8px;font-size:13px}.post-content pre{padding:16px;border-radius:var(--r)}}
  .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border);transition:border-color .15s}
.site-title:hover .avatar{border-color:var(--accent)}
.page-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.page-desc{color:var(--muted);font-size:15px;margin-bottom:32px}
.notes-list{display:flex;flex-direction:column;gap:16px}
.note-card{display:flex;gap:20px;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);text-decoration:none;color:var(--text);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.note-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(79,70,229,.12);transform:translateY(-1px)}
.note-icon{font-size:32px;flex-shrink:0;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--accent-bg);border-radius:var(--r)}
.note-body h2{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--text)}
.note-card:hover .note-body h2{color:var(--accent)}
.note-body p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.notes-content{margin-top:0}
  
/* Blog Card */
.blog-home{padding:0}
.blog-hero{padding:48px 0 40px;border-bottom:1px solid var(--border);margin-bottom:40px}
.blog-hero h1{font-size:34px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;color:var(--text)}
.blog-hero h1 .accent{color:var(--accent)}
.blog-hero p{font-size:15px;color:var(--muted)}
.blog-list{display:flex;flex-direction:column;gap:20px}
.blog-card{border-radius:var(--rl);border:1px solid var(--border);background:var(--surface);overflow:hidden;transition:box-shadow .2s,border-color .2s,transform .2s}
.blog-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:#d0d5dd;transform:translateY(-2px)}
.blog-card-inner{display:flex;flex-direction:column;text-decoration:none;color:inherit}
.blog-card-thumb{width:100%;height:200px;overflow:hidden;background:#f1f5f9}
.blog-card-thumb img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;margin:0;border-radius:0;box-shadow:none;transition:transform .4s}
.blog-card:hover .blog-card-thumb img{transform:scale(1.04)}
.blog-card-body{padding:20px 24px;display:flex;flex-direction:column;gap:8px}
.blog-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.blog-tag{display:inline-block;padding:1px 8px;background:var(--accent-bg);color:var(--accent);border-radius:999px;font-size:11px;font-weight:600}
.blog-card-title{font-size:20px;font-weight:700;letter-spacing:-.3px;line-height:1.35;color:var(--text);margin:0}
.blog-card:hover .blog-card-title{color:var(--accent)}
.blog-card-excerpt{font-size:14px;color:var(--muted);line-height:1.75;margin:0}
.blog-card-more{font-size:13px;color:var(--accent);font-weight:500;margin-top:4px}
@media(max-width:640px){.blog-card-thumb{height:160px}.blog-card-body{padding:16px 20px}.blog-card-title{font-size:17px}}

  
/* Comments */
.comments-section{margin-top:56px;padding-top:32px;border-top:1px solid var(--border)}
.comments-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:20px;letter-spacing:-.2px}
.giscus{margin-top:0}

  </style>
