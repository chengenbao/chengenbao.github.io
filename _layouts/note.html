<!DOCTYPE html>
<html lang="zh-CN">
  {% include head.html %}
  <body>
    {% include header.html %}

        <aside class="note-toc" id="toc">
          <div class="toc-title">目录</div>
          <div id="toc-list"></div>
        </aside>
        <article class="note-body">
          <h1 class="note-title">{{ page.title }}</h1>

          <!-- AdSense: 笔记顶部广告 -->

            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-6403387008742839"
                 data-ad-slot="auto"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
          </div>

          {{ content }}

          <!-- AdSense: 笔记底部广告 -->
          <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-6403387008742839"
                 data-ad-slot="auto"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
          </div>
        </article>
      </div>
    </main>
    {% include footer.html %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script>
      // highlight.js: 跳过 mermaid 代码块，只高亮其他语言
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('pre code').forEach(function(block) {
          if (!block.classList.contains('language-mermaid')) {
            hljs.highlightElement(block);
          }
        });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      // Initialize Mermaid
      mermaid.initialize({
        startOnLoad: false,
        theme: 'neutral',
        fontSize: 14,
        securityLevel: 'loose',
        flowchart: { 
          useMaxWidth: true, 
          htmlLabels: true,
          curve: 'basis'
        }
      });
      
      // Convert ```mermaid code blocks to mermaid divs
      document.addEventListener('DOMContentLoaded', function() {
        // Find all code blocks with language-mermaid class
        document.querySelectorAll('pre code.language-mermaid, pre > code.language-mermaid').forEach(function(codeBlock) {
          var pre = codeBlock.parentElement;
          var mermaidCode = codeBlock.textContent;
          
          // Create a new div for mermaid
          var mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.textContent = mermaidCode;
          
          // Replace pre with mermaid div
          pre.parentNode.replaceChild(mermaidDiv, pre);
        });
        
        // Also handle pre tags that directly contain mermaid code (no code wrapper)
        document.querySelectorAll('pre.language-mermaid').forEach(function(pre) {
          var mermaidCode = pre.textContent;
          var mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.textContent = mermaidCode;
          pre.parentNode.replaceChild(mermaidDiv, pre);
        });
        
        // Now render all mermaid diagrams
        mermaid.run();
      });
    </script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
      /* ===== Global Font ===== */
      .note-title {
        font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
        letter-spacing: 0.03em;
      }
      .note-body h2 {
        font-family: 'Noto Sans SC', sans-serif;
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .note-body h3 {
        font-family: 'Noto Sans SC', sans-serif;
        font-weight: 600;
      }
      .note-body h4 {
        font-family: 'Noto Sans SC', sans-serif;
        font-weight: 500;
      }
      .note-body p, .note-body li {
        line-height: 1.9;
      }
      .note-toc {
        font-family: 'Noto Sans SC', sans-serif;
      }
      /* ===== Note Layout ===== */
      .note-layout {
        display: flex;
        gap: 1.5rem;
        max-width: 98vw;
        width: 100%;
        margin: 2rem auto;
        padding: 0 2rem;
        align-items: flex-start;
        box-sizing: border-box;
      }
      .note-toc {
        position: sticky;
        top: 80px;
        width: clamp(160px, 18%, 240px);
        flex-shrink: 0;
        background: #f8f9fa;
        border-radius: 8px;
        padding: 1rem;
        border: 1px solid #e9ecef;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
        font-size: 0.8rem;
      }
      .toc-title {
        font-weight: 700;
        font-size: 0.9rem;
        color: #495057;
        margin-bottom: 0.75rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #dee2e6;
      }
      #toc-list a {
        display: block;
        color: #6c757d;
        text-decoration: none;
        padding: 3px 0;
        line-height: 1.4;
        transition: color 0.2s;
      }
      #toc-list a:hover { color: #007bff; }
      #toc-list a.toc-h2 { font-weight: 600; color: #495057; margin-top: 0.4rem; }
      #toc-list a.toc-h3 { padding-left: 0.8rem; font-size: 0.78rem; }
      .note-body {
        flex: 1;
        min-width: 0;
        width: 0;
      }
      .note-title {
        font-size: clamp(1.4rem, 2.5vw, 1.9rem);
        font-weight: 700;
        margin-bottom: 1.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 3px solid #007bff;
        color: #212529;
        font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
        letter-spacing: 0.03em;
      }
      /* ===== TOC active ===== */
      #toc-list a.active { color: #007bff; font-weight: 600; }
      /* ===== Mobile / Tablet ===== */
      @media (max-width: 900px) {
        .note-toc { display: none; }
        .note-layout { padding: 0 1.2rem; }
        .note-body pre { margin-left: 0; margin-right: 0; border-radius: 6px; }
        .note-body blockquote { margin-left: 0; margin-right: 0; }
        .note-body h3 { margin-left: 0; }
        .note-body { padding: 0 0.2rem; }
      }
      @media (max-width: 480px) {
        .note-layout { padding: 0 0.9rem; }
        .note-body pre { font-size: 0.82rem !important; padding: 0.75rem 0.9rem !important; }
      }
      /* ===== Problem Cards ===== */
      .note-body h3 {
        background: #f8f9fa;
        border-left: 4px solid #007bff;
        padding: 0.6rem 1rem;
        border-radius: 0 6px 6px 0;
        margin-top: 2rem;
        margin-bottom: 1rem;
        font-size: 1rem;
      }
      .note-body h3 a {
        color: #0056b3;
        text-decoration: none;
      }
      .note-body h3 a:hover { text-decoration: underline; }
      .note-body h4 {
        color: #495057;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 1rem;
        margin-bottom: 0.4rem;
        border-bottom: 1px dashed #dee2e6;
        padding-bottom: 0.2rem;
      }
      /* ===== Difficulty Badges ===== */
      .note-body h3 .easy  { background:#28a745; color:#fff; font-size:0.72rem; padding:2px 7px; border-radius:12px; margin-left:6px; font-weight:600; vertical-align:middle; }
      .note-body h3 .medium{ background:#fd7e14; color:#fff; font-size:0.72rem; padding:2px 7px; border-radius:12px; margin-left:6px; font-weight:600; vertical-align:middle; }
      .note-body h3 .hard  { background:#dc3545; color:#fff; font-size:0.72rem; padding:2px 7px; border-radius:12px; margin-left:6px; font-weight:600; vertical-align:middle; }
      /* ===== Mermaid diagrams ===== */
      .note-body .mermaid {
        text-align: center;
        margin: 1rem 0;
        overflow-x: auto;
      }
      /* ===== ASCII diagrams ===== */
      .note-body pre.ascii {
        background: #f8f9fa;
        color: #2c3e50;
        border: 1px solid #dee2e6;
        border-left: 4px solid #007bff;
        font-family: 'Fira Code', Consolas, monospace;
        font-size: 0.85rem;
        line-height: 1.5;
        padding: 1rem 1.2rem;
        border-radius: 0 8px 8px 0;
        overflow-x: auto;
      }
      /* ===== Code Blocks ===== */
      .note-body pre {
        border-radius: 8px;
        padding: 1rem 1.2rem !important;
        overflow-x: auto;
        font-size: 0.88rem !important;
        line-height: 1.6;
        margin: 0.75rem 0 1rem;
        border: 1px solid #e1e4e8;
      }
      .note-body code {
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      }
      .note-body p > code, .note-body li > code {
        background: #e8f4f8;
        color: #c7254e;
        padding: 2px 5px;
        border-radius: 4px;
        font-size: 0.88em;
      }
      /* ===== Blockquote for examples ===== */
      .note-body blockquote {
        background: #f0f7ff;
        border-left: 4px solid #007bff;
        border-radius: 0 6px 6px 0;
        margin: 0.5rem 0;
        padding: 0.6rem 1rem;
        color: #444;
      }
      /* ===== Lists ===== */
      .note-body ul, .note-body ol {
        padding-left: 1.8em;
        margin: 0.5rem 0;
      }
      .note-body ul li, .note-body ol li {
        margin-bottom: 0.25rem;
        line-height: 1.8;
      }

      /* ===== Tables ===== */
      .note-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.2rem 0 1.5rem;
        font-size: 0.9rem;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      }
      .note-body thead tr {
        background: linear-gradient(135deg, #007bff, #0056b3);
        color: #fff;
      }
      .note-body th {
        padding: 0.65rem 1rem;
        font-weight: 600;
        text-align: left;
        letter-spacing: 0.03em;
        white-space: nowrap;
      }
      .note-body td {
        padding: 0.55rem 1rem;
        border-bottom: 1px solid #e9ecef;
        vertical-align: middle;
        line-height: 1.6;
      }
      .note-body tbody tr:last-child td {
        border-bottom: none;
      }
      .note-body tbody tr:nth-child(even) {
        background: #f8f9fa;
      }
      .note-body tbody tr:hover td {
        background: #e8f4ff;
        transition: background 0.15s;
      }
      .note-body td strong {
        color: #0056b3;
      }
      /* ===== Complexity table ===== */
      .note-body ul li strong { color: #007bff; }
      /* ===== Section headers (h2) ===== */
      .note-body h2 {
        font-size: 1.3rem;
        color: #fff;
        background: linear-gradient(135deg, #007bff, #0056b3);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        margin-top: 2.5rem;
      }
      /* ===== TOC active ===== */
      #toc-list a.active { color: #007bff; font-weight: 600; }
      /* ===== Mobile ===== */
      @media (max-width: 900px) {
        .note-toc { display: none; }
        .note-layout { padding: 0 1.2rem; }
        .note-body pre { margin-left: 0; margin-right: 0; border-radius: 6px; }
        .note-body blockquote { margin-left: 0; margin-right: 0; }
        .note-body h3 { margin-left: 0; }
        .note-body { padding: 0 0.2rem; }
      }
      @media (max-width: 480px) {
        .note-layout { padding: 0 0.9rem; }
        .note-body pre { font-size: 0.82rem !important; padding: 0.75rem 0.9rem !important; }
      }

      /* ===== Inline Images ===== */
      .note-body img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 1.5rem auto;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        border: 1px solid #e9ecef;
      }
      /* 图片下方的斜体说明文字（kramdown 渲染为 <em> 包裹的 <p>）*/
      .note-body p > em:only-child {
        display: block;
        text-align: center;
        color: #6c757d;
        font-size: 0.82rem;
        margin-top: -1rem;
        margin-bottom: 1.5rem;
        font-style: italic;
      }
    </style>
    <script>
      // Build TOC from headings
      (function() {
        var headings = document.querySelectorAll('.note-body h2, .note-body h3');
        var toc = document.getElementById('toc-list');
        headings.forEach(function(h) {
          if (!h.id) h.id = h.textContent.trim().replace(/\s+/g,'-').replace(/[^\w\-\u4e00-\u9fff]/g,'').toLowerCase();
          var a = document.createElement('a');
          a.href = '#' + h.id;
          a.className = 'toc-' + h.tagName.toLowerCase();
          a.textContent = h.textContent.replace(/🟢|🟡|🔴/g,'').trim();
          toc.appendChild(a);
        });
        // Highlight active on scroll
        window.addEventListener('scroll', function() {
          var pos = window.scrollY + 120;
          var links = toc.querySelectorAll('a');
          links.forEach(function(a) {
            var target = document.querySelector(a.getAttribute('href'));
            if (target && target.offsetTop <= pos) {
              links.forEach(function(l){ l.classList.remove('active'); });
              a.classList.add('active');
            }
          });
        });
      })();
    </script>
    <!-- MathJax for LaTeX rendering -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true,
          processEnvironments: true
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
          processHtmlClass: 'note-body'
        },
        startup: {
          ready() {
            MathJax.startup.defaultReady();
            MathJax.startup.promise.then(() => {
              // Re-typeset after highlight.js runs
              if (typeof MathJax.typesetPromise !== 'undefined') {
                MathJax.typesetPromise();
              }
            });
          }
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <script>
    // Hide ad containers when AdSense fails to load or fill
    setTimeout(function() {
      document.querySelectorAll('.ad-container').forEach(function(el) {
        var ins = el.querySelector('ins.adsbygoogle');
        if (!ins || ins.getAttribute('data-ad-status') === 'unfilled' ||
            ins.innerHTML.trim() === '' || ins.offsetHeight === 0) {
          el.style.display = 'none';
        } else {
          el.style.margin = '24px 0';
        }
      });
    }, 3000);
