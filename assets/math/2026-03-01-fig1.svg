<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360" style="background:#fff;font-family:serif;">
  <!-- 圆 -->
  <circle cx="220" cy="180" r="80.0" fill="none" stroke="#4a90d9" stroke-width="2"/>
  <!-- 圆心 -->
  <circle cx="220" cy="180" r="3.5" fill="#4a90d9"/>
  <!-- OA 虚线（半径到切点）-->
  <line x1="220" y1="180" x2="175.6" y2="113.4" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>
  <!-- 切线 PA -->
  <line x1="75.8" y1="180.0" x2="175.6" y2="113.4" stroke="#333" stroke-width="1.8"/>
  <!-- 割线 P->C 延长 -->
  <line x1="75.8" y1="180.0" x2="270.6" y2="215.4" stroke="#333" stroke-width="1.8"/>
  <!-- BC 高亮 -->
  <line x1="154.5" y1="194.3" x2="252.9" y2="212.2" stroke="#e0294a" stroke-width="3" stroke-linecap="round"/>
  <!-- 直角标记 -->
  <polyline points="168.1,118.4 173.1,125.9 180.6,120.9" fill="none" stroke="#888" stroke-width="1.2"/>
  <!-- 点 -->
  <circle cx="75.8" cy="180.0" r="4.5" fill="#333"/>
  <circle cx="175.6" cy="113.4" r="4" fill="#333"/>
  <circle cx="154.5" cy="194.3" r="4" fill="#333"/>
  <circle cx="252.9" cy="212.2" r="4" fill="#333"/>
  <!-- 标注字母 -->
  <text x="57.8" y="185.0" font-size="16" font-weight="bold">P</text>
  <text x="169.6" y="101.4" font-size="16" font-weight="bold">A</text>
  <text x="160.5" y="210.3" font-size="16" font-weight="bold">B</text>
  <text x="258.9" y="228.2" font-size="16" font-weight="bold">C</text>
  <text x="226.0" y="172.0" font-size="14" fill="#4a90d9">O</text>
  <!-- 标注长度 -->
  <text x="97.7" y="136.7" font-size="12" fill="#555">PA=6</text>
  <text x="107.1" y="205.2" font-size="12" fill="#555">PB=4</text>
  <text x="207.7" y="221.3" font-size="12" fill="#e0294a" font-weight="bold">BC=5</text>
  <text x="226.0" y="144.7" font-size="11" fill="#4a90d9" opacity="0.8">r</text>
  <!-- 公式说明 -->
  <text x="10" y="340" font-size="13" fill="#444">PA² = PB · PC　⟹　36 = 4 × 9　✓</text>
</svg>