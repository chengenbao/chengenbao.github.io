<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360">
  <rect width="420" height="360" fill="white"/>
  
  <!-- 外圆（直径4英寸，半径2英寸） -->
  <circle cx="210" cy="170" r="130" fill="#d0d0d0" stroke="#333" stroke-width="2"/>
  
  <!-- 内圆（直径2英寸，半径1英寸） -->
  <circle cx="210" cy="170" r="65" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- 标注：外径 4 in. -->
  <line x1="80" y1="320" x2="340" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="313" x2="80" y2="327" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="313" x2="340" y2="327" stroke="#333" stroke-width="1.5"/>
  <text x="210" y="342" text-anchor="middle" font-family="Arial" font-size="16" fill="#333">4 in.</text>
  
  <!-- 标注：内径 2 in. -->
  <line x1="145" y1="170" x2="275" y2="170" stroke="#e00" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="210" y="160" text-anchor="middle" font-family="Arial" font-size="15" fill="#c00">2 in.</text>
  
  <!-- 标注：胶带厚度 0.015 in. -->
  <text x="210" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">胶带截面（灰色为胶带）</text>
  <text x="210" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">厚度 0.015 英寸</text>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c00"/>
    </marker>
  </defs>
</svg>