<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360">
  <!-- 白色背景 -->
  <rect width="420" height="360" fill="white"/>
  
  <!-- 坐标轴 -->
  <line x1="40" y1="320" x2="400" y2="320" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="40" y1="320" x2="40" y2="20" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
  
  <!-- 坐标轴标签 -->
  <text x="405" y="324" font-size="14" fill="#555">x</text>
  <text x="28" y="16" font-size="14" fill="#555">y</text>
  
  <!-- 刻度 (每格40px = 2单位) -->
  <!-- x轴刻度: 0,2,4,6,8,10 -->
  <!-- 原点在 (40, 320)，比例: 1单位 = 36px -->
  <!-- x: x_px = 40 + x*36, y: y_px = 320 - y*36 -->
  
  <!-- 网格线 -->
  <g stroke="#eee" stroke-width="1">
    <line x1="76" y1="20" x2="76" y2="320"/>
    <line x1="112" y1="20" x2="112" y2="320"/>
    <line x1="148" y1="20" x2="148" y2="320"/>
    <line x1="184" y1="20" x2="184" y2="320"/>
    <line x1="220" y1="20" x2="220" y2="320"/>
    <line x1="256" y1="20" x2="256" y2="320"/>
    <line x1="292" y1="20" x2="292" y2="320"/>
    <line x1="328" y1="20" x2="328" y2="320"/>
    <line x1="364" y1="20" x2="364" y2="320"/>
    <line x1="40" y1="284" x2="400" y2="284"/>
    <line x1="40" y1="248" x2="400" y2="248"/>
    <line x1="40" y1="212" x2="400" y2="212"/>
    <line x1="40" y1="176" x2="400" y2="176"/>
    <line x1="40" y1="140" x2="400" y2="140"/>
    <line x1="40" y1="104" x2="400" y2="104"/>
    <line x1="40" y1="68" x2="400" y2="68"/>
  </g>
  
  <!-- 刻度标签 x轴 -->
  <text x="72" y="336" font-size="11" fill="#666" text-anchor="middle">2</text>
  <text x="112" y="336" font-size="11" fill="#666" text-anchor="middle">3</text>
  <text x="148" y="336" font-size="11" fill="#666" text-anchor="middle">4</text>
  <text x="184" y="336" font-size="11" fill="#666" text-anchor="middle">5</text>
  <text x="220" y="336" font-size="11" fill="#666" text-anchor="middle">6</text>
  <text x="256" y="336" font-size="11" fill="#666" text-anchor="middle">7</text>
  <text x="292" y="336" font-size="11" fill="#666" text-anchor="middle">8</text>
  <text x="328" y="336" font-size="11" fill="#666" text-anchor="middle">9</text>
  <text x="364" y="336" font-size="11" fill="#666" text-anchor="middle">10</text>
  
  <!-- 刻度标签 y轴 -->
  <text x="28" y="288" font-size="11" fill="#666" text-anchor="middle">1</text>
  <text x="28" y="252" font-size="11" fill="#666" text-anchor="middle">2</text>
  <text x="28" y="216" font-size="11" fill="#666" text-anchor="middle">3</text>
  <text x="28" y="180" font-size="11" fill="#666" text-anchor="middle">4</text>
  <text x="28" y="144" font-size="11" fill="#666" text-anchor="middle">5</text>
  <text x="28" y="108" font-size="11" fill="#666" text-anchor="middle">6</text>
  <text x="28" y="72" font-size="11" fill="#666" text-anchor="middle">7</text>
  
  <!-- 坐标换算: 1单位=36px, 原点(40,320) -->
  <!-- A(2,2): (40+2*36, 320-2*36) = (112, 248) -->
  <!-- B(6,4): (40+6*36, 320-4*36) = (256, 176) -->
  <!-- C(4,6): (40+4*36, 320-6*36) = (184, 104) -->
  
  <!-- 填色三角形 -->
  <polygon points="112,248 256,176 184,104" fill="rgba(100,150,255,0.15)" stroke="none"/>
  
  <!-- 直线1: y = x/2 + 1, 斜率1/2, 延伸到 x=0~10 -->
  <!-- x=0: y=1 → (40, 284); x=10: y=6 → (400, 104) -->
  <line x1="40" y1="284" x2="400" y2="104" stroke="#e74c3c" stroke-width="2" stroke-dasharray="none"/>
  
  <!-- 直线2: y = 2x - 2, 斜率2, 延伸到合理范围 -->
  <!-- x=1: y=0 → (76, 320); x=8: y=14(超出) → 限制到x=8→y=14超出，改到y=0~8 -->
  <!-- y=0: x=1; y=8: x=5 → (220, 32) 但y=8时x=5 -->
  <!-- x=1: y=0 → (76,320); x=5: y=8 → (220, 32) -->
  <line x1="76" y1="320" x2="256" y2="176" stroke="#27ae60" stroke-width="2"/>
  <!-- 延伸线（虚线） -->
  <line x1="256" y1="176" x2="310" y2="68" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  
  <!-- 直线3: x+y=10, 即y=10-x -->
  <!-- x=0: y=10 → (40, -40) 超出; x=4: y=6 → (184, 104); x=10: y=0 → (400, 320) -->
  <line x1="184" y1="104" x2="400" y2="320" stroke="#8e44ad" stroke-width="2"/>
  <!-- 延伸到x轴以上 -->
  <line x1="40" y1="284" x2="184" y2="104" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  
  <!-- 顶点 A(2,2) -->
  <circle cx="112" cy="248" r="5" fill="#e74c3c"/>
  <text x="100" y="244" font-size="13" fill="#e74c3c" font-weight="bold">A(2,2)</text>
  
  <!-- 顶点 B(6,4) -->
  <circle cx="256" cy="176" r="5" fill="#27ae60"/>
  <text x="262" y="174" font-size="13" fill="#27ae60" font-weight="bold">B(6,4)</text>
  
  <!-- 顶点 C(4,6) -->
  <circle cx="184" cy="104" r="5" fill="#8e44ad"/>
  <text x="148" y="100" font-size="13" fill="#8e44ad" font-weight="bold">C(4,6)</text>
  
  <!-- 图例 -->
  <rect x="40" y="20" width="165" height="72" fill="white" stroke="#ddd" rx="4"/>
  <line x1="48" y1="34" x2="70" y2="34" stroke="#e74c3c" stroke-width="2"/>
  <text x="75" y="38" font-size="11" fill="#e74c3c">y = ½x + 1 (斜率½)</text>
  <line x1="48" y1="52" x2="70" y2="52" stroke="#27ae60" stroke-width="2"/>
  <text x="75" y="56" font-size="11" fill="#27ae60">y = 2x − 2 (斜率2)</text>
  <line x1="48" y1="70" x2="70" y2="70" stroke="#8e44ad" stroke-width="2"/>
  <text x="75" y="74" font-size="11" fill="#8e44ad">x + y = 10</text>
  
  <!-- 面积标注 -->
  <text x="185" y="195" font-size="13" fill="#2980b9" font-weight="bold">面积 = 6</text>
</svg>