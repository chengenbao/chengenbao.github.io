<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" style="background:#fff">
  <!-- 标题 -->
  <text x="210" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">牙签网格示意图（2×3 简化版，共 17 根牙签）</text>
  
  <!-- 绘制 2×3 网格 (每格 60px) -->
  <!-- 起点: (60, 60) -->
  
  <!-- 外部牙签（蓝色）水平线 -->
  <!-- 顶行 -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#2196F3" stroke-width="4"/>
  <line x1="120" y1="60" x2="180" y2="60" stroke="#2196F3" stroke-width="4"/>
  <line x1="180" y1="60" x2="240" y2="60" stroke="#2196F3" stroke-width="4"/>
  <!-- 底行 -->
  <line x1="60" y1="180" x2="120" y2="180" stroke="#2196F3" stroke-width="4"/>
  <line x1="120" y1="180" x2="180" y2="180" stroke="#2196F3" stroke-width="4"/>
  <line x1="180" y1="180" x2="240" y2="180" stroke="#2196F3" stroke-width="4"/>
  <!-- 外部牙签 垂直线 -->
  <!-- 左列 -->
  <line x1="60" y1="60" x2="60" y2="120" stroke="#2196F3" stroke-width="4"/>
  <line x1="60" y1="120" x2="60" y2="180" stroke="#2196F3" stroke-width="4"/>
  <!-- 右列 -->
  <line x1="240" y1="60" x2="240" y2="120" stroke="#2196F3" stroke-width="4"/>
  <line x1="240" y1="120" x2="240" y2="180" stroke="#2196F3" stroke-width="4"/>
  
  <!-- 内部牙签（红色）水平内部 -->
  <line x1="60" y1="120" x2="120" y2="120" stroke="#F44336" stroke-width="4"/>
  <line x1="120" y1="120" x2="180" y2="120" stroke="#F44336" stroke-width="4"/>
  <line x1="180" y1="120" x2="240" y2="120" stroke="#F44336" stroke-width="4"/>
  <!-- 内部牙签 垂直内部 -->
  <line x1="120" y1="60" x2="120" y2="120" stroke="#F44336" stroke-width="4"/>
  <line x1="120" y1="120" x2="120" y2="180" stroke="#F44336" stroke-width="4"/>
  <line x1="180" y1="60" x2="180" y2="120" stroke="#F44336" stroke-width="4"/>
  <line x1="180" y1="120" x2="180" y2="180" stroke="#F44336" stroke-width="4"/>
  
  <!-- 图例 -->
  <line x1="60" y1="230" x2="100" y2="230" stroke="#2196F3" stroke-width="4"/>
  <text x="110" y="235" font-size="13" fill="#333">外部牙签（10 根）</text>
  <line x1="60" y1="260" x2="100" y2="260" stroke="#F44336" stroke-width="4"/>
  <text x="110" y="265" font-size="13" fill="#333">内部牙签（7 根）</text>
  
  <!-- 说明 -->
  <text x="210" y="300" text-anchor="middle" font-size="12" fill="#666">2×3 网格：共 17 根牙签，内部 7 根 ≈ 41%</text>
  <text x="210" y="325" text-anchor="middle" font-size="12" fill="#666">20×24 网格：共 1004 根，内部 916 根 ≈ 91%</text>
  
  <!-- 方格号标 -->
  <text x="90" y="95" text-anchor="middle" font-size="11" fill="#888">方格</text>
  <text x="150" y="95" text-anchor="middle" font-size="11" fill="#888">方格</text>
  <text x="210" y="95" text-anchor="middle" font-size="11" fill="#888">方格</text>
  <text x="90" y="155" text-anchor="middle" font-size="11" fill="#888">方格</text>
  <text x="150" y="155" text-anchor="middle" font-size="11" fill="#888">方格</text>
  <text x="210" y="155" text-anchor="middle" font-size="11" fill="#888">方格</text>
</svg>