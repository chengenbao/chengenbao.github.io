<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360">
<rect width="420" height="360" fill="white"/>
<text x="210" y="30" text-anchor="middle" font-size="14" font-family="serif" fill="#333" font-weight="bold">五年级图示：从n个位置选k个互不相邻的方案</text>
<text x="210" y="75" text-anchor="middle" font-size="12" font-family="serif" fill="#555">示例：选中位置 1, 4, 8（互不相邻）</text>
<circle cx="40" cy="100" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
<text x="40" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">1</text>
<circle cx="78" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="78" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">2</text>
<circle cx="116" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="116" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">3</text>
<circle cx="154" cy="100" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
<text x="154" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">4</text>
<circle cx="192" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="192" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">5</text>
<circle cx="230" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="230" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">6</text>
<circle cx="268" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="268" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">7</text>
<circle cx="306" cy="100" r="14" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
<text x="306" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">8</text>
<circle cx="344" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="344" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">9</text>
<circle cx="382" cy="100" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="382" y="105" text-anchor="middle" font-size="12" font-family="serif" fill="#333">10</text>
<line x1="54" y1="100" x2="64" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="92" y1="100" x2="102" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="130" y1="100" x2="140" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="168" y1="100" x2="178" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="206" y1="100" x2="216" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="244" y1="100" x2="254" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="282" y1="100" x2="292" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="320" y1="100" x2="330" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="358" y1="100" x2="368" y2="100" stroke="#95a5a6" stroke-width="1.5"/>
<text x="210" y="135" text-anchor="middle" font-size="11" font-family="serif" fill="#e74c3c">红色位置互不相邻（任意两个之间至少隔一个空位）</text>
<text x="210" y="170" text-anchor="middle" font-size="13" font-family="serif" fill="#2c3e50" font-weight="bold">隔板变换：令 aᵢ = bᵢ - (i-1)，将问题转化</text>
<text x="210" y="195" text-anchor="middle" font-size="11" font-family="serif" fill="#555">转化后：从 8 个位置任意选 3 个（无限制）→ C(8,3)=56</text>
<circle cx="60" cy="215" r="14" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
<text x="60" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">1</text>
<circle cx="103" cy="215" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="103" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">2</text>
<circle cx="146" cy="215" r="14" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
<text x="146" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">3</text>
<circle cx="189" cy="215" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="189" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">4</text>
<circle cx="232" cy="215" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="232" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">5</text>
<circle cx="275" cy="215" r="14" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
<text x="275" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">6</text>
<circle cx="318" cy="215" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="318" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">7</text>
<circle cx="361" cy="215" r="14" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
<text x="361" y="220" text-anchor="middle" font-size="12" font-family="serif" fill="#333">8</text>
<line x1="74" y1="215" x2="89" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="117" y1="215" x2="132" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="160" y1="215" x2="175" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="203" y1="215" x2="218" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="246" y1="215" x2="261" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="289" y1="215" x2="304" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<line x1="332" y1="215" x2="347" y2="215" stroke="#95a5a6" stroke-width="1.5"/>
<text x="210" y="265" text-anchor="middle" font-size="14" font-family="serif" fill="#8e44ad" font-weight="bold">公式：C(n−k+1, k)</text>
<text x="210" y="290" text-anchor="middle" font-size="12" font-family="serif" fill="#555">n=10, k=3: C(8,3) = 56 种</text>
<rect x="1" y="1" width="418" height="358" fill="none" stroke="#bdc3c7" stroke-width="1.5" rx="4"/>
</svg>