<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" style="background:#fff;font-family:serif;">
  <!-- 背景 -->
  <rect width="420" height="360" fill="#f8f9ff" rx="8"/>
  
  <!-- 圆 -->
  <circle cx="210.0" cy="180.0" r="100.0" fill="none" stroke="#4a90d9" stroke-width="2.2"/>
  
  <!-- 割线 PBC（延长到圆外右侧） -->
  <line x1="50.0" y1="250.0" x2="337.9" y2="149.2" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="50.0" y1="250.0" x2="307.9" y2="159.7" stroke="#555" stroke-width="1.8"/>
  
  <!-- 切线 PA（红色高亮） -->
  <line x1="50.0" y1="250.0" x2="124.7" y2="127.8" stroke="#e84040" stroke-width="2.5"/>
  
  <!-- OA（半径，虚线） -->
  <line x1="210.0" y1="180.0" x2="124.7" y2="127.8" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3"/>
  
  <!-- 直角标记（切点A处）-->
  <g transform="translate(124.7,127.8)">
    <rect x="-7" y="-7" width="10" height="10" fill="none" stroke="#e84040" stroke-width="1.3" 
          transform="rotate(-148.6)"/>
  </g>
  
  <!-- 点 -->
  <circle cx="50.0" cy="250.0" r="5" fill="#333"/>
  <circle cx="120.8" cy="225.2" r="4.5" fill="#4a90d9"/>
  <circle cx="307.9" cy="159.7" r="4.5" fill="#4a90d9"/>
  <circle cx="124.7" cy="127.8" r="5" fill="#e84040"/>
  <circle cx="210.0" cy="180.0" r="3.5" fill="#888"/>
  
  <!-- 标签 -->
  <text x="32.0" y="256.0" font-size="17" font-weight="bold" fill="#222">P</text>
  <text x="126.8" y="217.2" font-size="16" fill="#2255aa">B</text>
  <text x="313.9" y="165.7" font-size="16" fill="#2255aa">C</text>
  <text x="132.7" y="119.8" font-size="17" font-weight="bold" fill="#e84040">A</text>
  <text x="215.0" y="172.0" font-size="14" fill="#888">O</text>
  
  <!-- 公式说明 -->
  <rect x="90" y="308" width="240" height="36" rx="6" fill="#fff3f3" stroke="#e84040" stroke-width="1.2"/>
  <text x="210" y="329" font-size="14.5" fill="#c0392b" text-anchor="middle" font-style="italic">PA² = PB · PC（切割线定理）</text>
  
  <!-- 标题 -->
  <text x="210" y="28" font-size="15" fill="#444" text-anchor="middle">圆的切割线定理示意图</text>
</svg>