<svg xmlns="http://www.w3.org/2000/svg" width="500" height="380" viewBox="0 0 500 380">
<rect width="100%" height="100%" fill="white"/>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 6, 0 6" fill="#555" transform="rotate(180,4,3)"/>
  </marker>
</defs>
<polygon points="200,280 360,280 360,120 200,120" fill="#f0f4ff" stroke="#2244aa" stroke-width="2.5" fill-opacity="0.7"/>
<line x1="200" y1="280" x2="296.0" y2="120" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
<line x1="200" y1="280" x2="40" y2="184.0" stroke="#e07000" stroke-width="2" stroke-dasharray="6,4"/>
<line x1="379.2" y1="328.0" x2="270.4" y2="56.0" stroke="#cc2222" stroke-width="1.8" stroke-dasharray="8,4"/>
<line x1="248.0" y1="100.8" x2="16.0" y2="193.6" stroke="#2288aa" stroke-width="1.8" stroke-dasharray="8,4"/>
<polygon points="200,280 200,120 40,184.0" fill="#fff0cc" stroke="#e07000" stroke-width="2" fill-opacity="0.6"/>
<polygon points="200,280 360,280 296.0,120" fill="#cce8ff" stroke="#2244aa" stroke-width="2" fill-opacity="0.7"/>
<!-- 90 degree angle mark at A -->
<polygon points="207.2,268.0 195.2,260.8 188.0,272.8 200,280" fill="none" stroke="#e07000" stroke-width="1.2"/>
<circle cx="200.0" cy="280.0" r="5" fill="#2244aa" stroke="white" stroke-width="1.5"/>
<circle cx="360.0" cy="280.0" r="5" fill="#2244aa" stroke="white" stroke-width="1.5"/>
<circle cx="360.0" cy="120.0" r="5" fill="#888888" stroke="white" stroke-width="1.5"/>
<circle cx="200.0" cy="120.0" r="5" fill="#2244aa" stroke="white" stroke-width="1.5"/>
<circle cx="296.0" cy="120.0" r="5" fill="#cc2222" stroke="white" stroke-width="1.5"/>
<circle cx="40.0" cy="184.0" r="5" fill="#e07000" stroke="white" stroke-width="1.5"/>
<text x="184.0" y="286.0" font-family="serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">A</text>
<text x="376.0" y="286.0" font-family="serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">B</text>
<text x="376.0" y="112.0" font-family="serif" font-size="16" font-weight="bold" fill="#888888" text-anchor="middle">C</text>
<text x="184.0" y="112.0" font-family="serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">D</text>
<text x="296.0" y="138.0" font-family="serif" font-size="16" font-weight="bold" fill="#cc2222" text-anchor="middle">P</text>
<text x="24.0" y="184.0" font-family="serif" font-size="16" font-weight="bold" fill="#e07000" text-anchor="middle">Q</text>
<text x="318.0" y="110.0" font-family="serif" font-size="13" fill="#cc2222">∠BPQ=45°</text>
<text x="132.0" y="232.0" font-family="serif" font-size="12" fill="#e07000" font-style="italic">AP=AQ</text>
<text x="250" y="30" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">旋转构造：△ABP 绕 A 旋转90° → △ADQ</text>
<rect x="320" y="310" width="160" height="58" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
<line x1="330" y1="325" x2="360" y2="325" stroke="#cce8ff" stroke-width="6"/>
<line x1="330" y1="325" x2="360" y2="325" stroke="#2244aa" stroke-width="1.5"/>
<text x="368" y="329" font-family="sans-serif" font-size="11" fill="#333">△ABP（旋转前）</text>
<line x1="330" y1="345" x2="360" y2="345" stroke="#fff0cc" stroke-width="6"/>
<line x1="330" y1="345" x2="360" y2="345" stroke="#e07000" stroke-width="1.5"/>
<text x="368" y="349" font-family="sans-serif" font-size="11" fill="#333">△ADQ（旋转后）</text>
<text x="330" y="363" font-family="sans-serif" font-size="11" fill="#e07000">∠PAQ=90°, AP=AQ</text>
</svg>