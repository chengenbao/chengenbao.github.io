<svg xmlns="http://www.w3.org/2000/svg" width="520" height="420" style="background:white;font-family:serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- 正方形 ABCD -->
  <polygon points="245.3,121.0 392.0,121.0 392.0,282.9 245.3,282.9"
    fill="#f0f4ff" stroke="#3355aa" stroke-width="2"/>

  <!-- 三角形 ABP（填色） -->
  <polygon points="245.3,121.0 392.0,121.0 318.7,282.9"
    fill="#cce0ff" fill-opacity="0.6" stroke="#2266cc" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 三角形 ADQ（填色） -->
  <polygon points="245.3,121.0 245.3,282.9 98.7,201.9"
    fill="#ffe0cc" fill-opacity="0.6" stroke="#cc6622" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- BP 延长线到交点 M -->
  <line x1="392.0" y1="121.0"
        x2="304.0" y2="315.2"
        stroke="#2266cc" stroke-width="2"/>

  <!-- DQ 延长线到交点 M -->
  <line x1="245.3" y1="282.9"
        x2="304.0" y2="315.2"
        stroke="#cc6622" stroke-width="2"/>

  <!-- 直角符号 -->
  <polyline points="300.1 323.9 292.2 319.6 296.1 310.9"
    fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- AP 连线（旋转轴参考） -->
  <line x1="245.3" y1="121.0"
        x2="318.7" y2="282.9"
        stroke="#888" stroke-width="1.2" stroke-dasharray="4,4"/>
  <!-- AQ 连线 -->
  <line x1="245.3" y1="121.0"
        x2="98.7" y2="201.9"
        stroke="#888" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- 旋转弧（从 AP 到 AQ 方向） -->
  <!-- 从 P 方向到 Q 方向，弧半径取 AP/3 -->

  <!-- 各点标注 -->
  <circle cx="245.3" cy="121.0" r="4" fill="#3355aa"/>
  <circle cx="392.0" cy="121.0" r="4" fill="#3355aa"/>
  <circle cx="392.0" cy="282.9" r="4" fill="#3355aa"/>
  <circle cx="245.3" cy="282.9" r="4" fill="#3355aa"/>
  <circle cx="318.7" cy="282.9" r="4" fill="#2266cc"/>
  <circle cx="98.7" cy="201.9" r="4" fill="#cc6622"/>
  <circle cx="304.0" cy="315.2" r="3" fill="#555"/>

  <!-- 标签 -->
  <text x="227.3" y="113.0" font-size="18" fill="#3355aa" font-style="italic">A</text>
  <text x="398.0" y="113.0" font-size="18" fill="#3355aa" font-style="italic">B</text>
  <text x="398.0" y="300.9" font-size="18" fill="#3355aa" font-style="italic">C</text>
  <text x="227.3" y="300.9" font-size="18" fill="#3355aa" font-style="italic">D</text>
  <text x="324.7" y="300.9" font-size="18" fill="#2266cc" font-style="italic">P</text>
  <text x="76.7" y="207.9" font-size="18" fill="#cc6622" font-style="italic">Q</text>
  <text x="310.0" y="331.2" font-size="15" fill="#555" font-style="italic">M</text>

  <!-- BP = DQ 标注 -->
  <text x="363.3" y="201.9"
    font-size="13" fill="#2266cc">BP</text>
  <text x="144.0" y="238.4"
    font-size="13" fill="#cc6622">DQ</text>

  <!-- 旋转标注 -->
  <text x="220" y="50" font-size="13" fill="#555" text-anchor="middle">△ABP ——顺时针90°——→ △ADQ</text>
  <text x="220" y="68" font-size="13" fill="#555" text-anchor="middle">BP ⊥ DQ，BP = DQ</text>
</svg>