<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360">
  <rect width="420" height="360" fill="white"/>
  
  <!-- 外层大等边三角形 -->
  <!-- 顶点: top(210,30), bottom-left(60,300), bottom-right(360,300) -->
  <polygon points="210,30 60,300 360,300" fill="none" stroke="#333" stroke-width="2.5"/>
  
  <!-- 内层小等边三角形（边长为外层2/3） -->
  <!-- 内三角形顶点在外三角形各边的1/3处 -->
  <!-- top inner: (210, 30) 与 (60,300) 连线的1/3处 = (160, 120) -->
  <!-- 实际用相似缩放：内三角形边长=2/3外，重心相同，旋转0° -->
  <!-- 外三角形重心 = ((210+60+360)/3, (30+300+300)/3) = (210, 210) -->
  <!-- 内三角形：各顶点 = 重心 + 2/3*(外顶点-重心) -->
  <!-- top: 210 + 2/3*(210-210), 210 + 2/3*(30-210) = 210, 90 -->
  <!-- bl: 210 + 2/3*(60-210), 210 + 2/3*(300-210) = 110, 270 -->
  <!-- br: 210 + 2/3*(360-210), 210 + 2/3*(300-210) = 310, 270 -->
  <polygon points="210,90 110,270 310,270" fill="#e8f4f8" stroke="#333" stroke-width="2"/>
  
  <!-- 三个梯形（灰色填充交替） -->
  <!-- 梯形1: 上方区域 外顶-内左肩-内顶-内右肩... 实际是外顶+两侧内顶连线形成梯形 -->
  <!-- 梯形1 上: 210,30 → 连到内三角形上顶 210,90，以及对应外边中点 -->
  <!-- 外左边上1/3: (60+2*(210-60)/3, 300+2*(30-300)/3) = (160,120) -->
  <!-- 外右边上1/3: (360+2*(210-360)/3, 300+2*(30-300)/3) = (260,120) -->
  
  <!-- 梯形1（顶部，灰色）: 外顶(210,30) 外左1/3(160,120) 内顶(210,90) 外右1/3(260,120) -->
  <!-- 实际三角形划分：外三角形各边三等分，连到内三角形顶点 -->
  <!-- 外边三等分点：
    左边(210,30)→(60,300): 
      1/3点: (210+1/3*(60-210), 30+1/3*(300-30)) = (160, 120)
      2/3点: (210+2/3*(60-210), 30+2/3*(300-30)) = (110, 210) = 内bl
    右边(210,30)→(360,300):
      1/3点: (260,120)
      2/3点: (310,210) = 内br  
    底边(60,300)→(360,300):
      1/3点: (160,300)
      2/3点: (260,300)
  -->
  
  <!-- 梯形1（顶部）: (210,30), (260,120), (210,90), (160,120) -->
  <polygon points="210,30 260,120 210,90 160,120" fill="#b8d4e8" stroke="#555" stroke-width="1.5"/>
  
  <!-- 梯形2（右下）: (360,300), (260,300), (310,270), (260,120) -->
  <polygon points="360,300 260,300 310,270 260,120" fill="#b8d4e8" stroke="#555" stroke-width="1.5"/>
  
  <!-- 梯形3（左下）: (60,300), (160,120), (110,270), (160,300) -->
  <polygon points="60,300 160,120 110,270 160,300" fill="#b8d4e8" stroke="#555" stroke-width="1.5"/>
  
  <!-- 重绘内三角形边界（确保可见） -->
  <polygon points="210,90 110,270 310,270" fill="none" stroke="#222" stroke-width="2"/>
  <!-- 重绘外三角形 -->
  <polygon points="210,30 60,300 360,300" fill="none" stroke="#222" stroke-width="2.5"/>
  
  <!-- 连接线（外边1/3点到内三角顶点） -->
  <line x1="160" y1="120" x2="210" y2="90" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="260" y1="120" x2="210" y2="90" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="160" y1="120" x2="110" y2="270" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="260" y1="120" x2="310" y2="270" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="160" y1="300" x2="110" y2="270" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="260" y1="300" x2="310" y2="270" stroke="#666" stroke-width="1.2" stroke-dasharray="4,3"/>
  
  <!-- 标注外三角形顶点 -->
  <circle cx="210" cy="30" r="4" fill="#222"/>
  <circle cx="60" cy="300" r="4" fill="#222"/>
  <circle cx="360" cy="300" r="4" fill="#222"/>
  <!-- 标注内三角形顶点 -->
  <circle cx="210" cy="90" r="3.5" fill="#444"/>
  <circle cx="110" cy="270" r="3.5" fill="#444"/>
  <circle cx="310" cy="270" r="3.5" fill="#444"/>
  
  <!-- 边长标注 -->
  <!-- 外三角形右边标注 3 -->
  <text x="300" y="175" font-size="16" fill="#c0392b" font-weight="bold" font-family="Arial">3</text>
  <!-- 内三角形右边标注 2 -->
  <text x="275" y="200" font-size="16" fill="#2980b9" font-weight="bold" font-family="Arial">2</text>
  
  <!-- 梯形标注 -->
  <text x="185" y="75" font-size="11" fill="#555" font-family="Arial">梯形1</text>
  <text x="298" y="230" font-size="11" fill="#555" font-family="Arial">梯形2</text>
  <text x="78" y="230" font-size="11" fill="#555" font-family="Arial">梯形3</text>
  
  <!-- 内三角形标注 -->
  <text x="175" y="210" font-size="12" fill="#2c3e50" font-weight="bold" font-family="Arial">内△</text>
  
  <!-- 标题 -->
  <text x="210" y="340" text-anchor="middle" font-size="13" fill="#2c3e50" font-family="Arial">
    等边三角形嵌套（内三角边长 = 外三角边长 × 2/3）
  </text>
</svg>
