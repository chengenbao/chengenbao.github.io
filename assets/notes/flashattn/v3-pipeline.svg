<svg width="720" height="380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="380" fill="#fff"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">FlashAttention v3：异步流水线（H100 Hopper）</text>

  <!-- 时间轴标题 -->
  <text x="30" y="58" font-size="12" fill="#555">时间 →</text>
  <line x1="100" y1="52" x2="695" y2="52" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Producer (TMA) -->
  <text x="30" y="90" font-size="12" font-weight="bold" fill="#7b1fa2">Producer</text>
  <text x="30" y="104" font-size="10" fill="#7b1fa2">(TMA预取)</text>
  <rect x="100" y="70" width="130" height="40" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="165" y="86" text-anchor="middle" font-size="11" fill="#4a148c">异步预取</text>
  <text x="165" y="101" text-anchor="middle" font-size="11" fill="#4a148c">K₁/V₁ → SRAM</text>
  <rect x="265" y="70" width="130" height="40" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="330" y="86" text-anchor="middle" font-size="11" fill="#4a148c">异步预取</text>
  <text x="330" y="101" text-anchor="middle" font-size="11" fill="#4a148c">K₂/V₂ → SRAM</text>
  <rect x="430" y="70" width="130" height="40" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="495" y="86" text-anchor="middle" font-size="11" fill="#4a148c">异步预取</text>
  <text x="495" y="101" text-anchor="middle" font-size="11" fill="#4a148c">K₃/V₃ → SRAM</text>
  <rect x="595" y="70" width="100" height="40" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="645" y="91" text-anchor="middle" font-size="11" fill="#4a148c">预取 K₄...</text>

  <!-- 连接箭头 -->
  <line x1="230" y1="90" x2="265" y2="90" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="395" y1="90" x2="430" y2="90" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="90" x2="595" y2="90" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Consumer (WGMMA) -->
  <text x="30" y="158" font-size="12" font-weight="bold" fill="#1565c0">Consumer</text>
  <text x="30" y="172" font-size="10" fill="#1565c0">(WGMMA计算)</text>
  <rect x="182" y="130" width="148" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="256" y="146" text-anchor="middle" font-size="11" fill="#0d47a1">WGMMA 计算</text>
  <text x="256" y="161" text-anchor="middle" font-size="11" fill="#0d47a1">tile₁ (K₁,V₁)</text>
  <rect x="347" y="130" width="148" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="421" y="146" text-anchor="middle" font-size="11" fill="#0d47a1">WGMMA 计算</text>
  <text x="421" y="161" text-anchor="middle" font-size="11" fill="#0d47a1">tile₂ (K₂,V₂)</text>
  <rect x="512" y="130" width="148" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="586" y="146" text-anchor="middle" font-size="11" fill="#0d47a1">WGMMA 计算</text>
  <text x="586" y="161" text-anchor="middle" font-size="11" fill="#0d47a1">tile₃ (K₃,V₃)</text>

  <!-- 双缓冲标注 -->
  <rect x="100" y="185" width="595" height="30" rx="4" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
  <text x="397" y="205" text-anchor="middle" font-size="11" fill="#e65100">双缓冲（Double Buffering）：Consumer 使用 Buffer A 时，Producer 已在写 Buffer B → HBM 延迟完全隐藏</text>

  <!-- GEMM-Softmax 交错 -->
  <text x="360" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Intra-warpgroup 流水线：GEMM 与 Softmax 交错</text>
  <rect x="60" y="252" width="155" height="46" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="137" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Tensor Core</text>
  <text x="137" y="287" text-anchor="middle" font-size="11" fill="#2e7d32">WGMMA(Q, Kⱼ)</text>
  <rect x="230" y="252" width="155" height="46" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="307" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">CUDA Core</text>
  <text x="307" y="287" text-anchor="middle" font-size="11" fill="#c62828">softmax rescale(Oᵢ₋₁)</text>
  <rect x="400" y="252" width="155" height="46" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="477" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Tensor Core</text>
  <text x="477" y="287" text-anchor="middle" font-size="11" fill="#2e7d32">WGMMA(Pⱼ, Vⱼ)</text>
  <rect x="570" y="252" width="90" height="46" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="615" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">CUDA Core</text>
  <text x="615" y="287" text-anchor="middle" font-size="11" fill="#c62828">rescale...</text>

  <!-- 并行标注 -->
  <line x1="137" y1="300" x2="307" y2="300" stroke="#e67e22" stroke-width="2" stroke-dasharray="0"/>
  <text x="222" y="315" text-anchor="middle" font-size="11" fill="#e67e22">同时执行（不竞争执行单元）</text>
  <line x1="477" y1="300" x2="615" y2="300" stroke="#e67e22" stroke-width="2" stroke-dasharray="0"/>

  <!-- 性能 -->
  <rect x="100" y="330" width="520" height="30" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="360" y="350" text-anchor="middle" font-size="11" fill="#1b5e20">H100 峰值利用率：v2 ~35% → v3 ~75%（FP16），FP8 可达 ~120 TFLOPs/s</text>
</svg>