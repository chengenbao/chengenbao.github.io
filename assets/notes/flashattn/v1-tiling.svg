<svg width="720" height="400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="400" fill="#fff"/>
  <!-- title -->
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">FlashAttention v1：Tiling + Online Softmax（IO 感知）</text>

  <!-- 左侧：标准 Attention -->
  <text x="170" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">标准 Attention（Memory-bound）</text>
  <!-- HBM boxes -->
  <rect x="40" y="75" width="260" height="36" rx="6" fill="#ffeaea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="170" y="98" text-anchor="middle" font-size="12" fill="#c0392b">HBM：读 Q, K, V</text>
  <text x="170" y="122" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="40" y="130" width="260" height="36" rx="6" fill="#fff3cd" stroke="#e67e22" stroke-width="1.5"/>
  <text x="170" y="153" text-anchor="middle" font-size="12" fill="#e67e22">SRAM：计算 S = QKᵀ/√d</text>
  <text x="170" y="177" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="40" y="185" width="260" height="36" rx="6" fill="#ffeaea" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">⚠ HBM：写 S（N²元素）</text>
  <text x="170" y="232" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="40" y="240" width="260" height="36" rx="6" fill="#ffeaea" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">⚠ HBM：读 S → softmax(S)</text>
  <text x="170" y="287" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="40" y="295" width="260" height="36" rx="6" fill="#ffeaea" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">⚠ HBM：写 P，读 P → PV</text>
  <text x="170" y="342" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="40" y="350" width="260" height="36" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="170" y="373" text-anchor="middle" font-size="12" fill="#27ae60">HBM：写 O</text>

  <!-- 右侧：FlashAttention v1 -->
  <text x="560" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">FlashAttention v1（IO 感知）</text>
  <rect x="420" y="75" width="260" height="36" rx="6" fill="#e8f4fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="550" y="98" text-anchor="middle" font-size="12" fill="#1565c0">HBM：分块读 Q tile, K tile, V tile</text>
  <text x="550" y="122" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="420" y="130" width="260" height="80" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="550" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">SRAM：完整计算一个 tile</text>
  <text x="550" y="173" text-anchor="middle" font-size="11" fill="#2e7d32">QKᵀ → Online Softmax → PV</text>
  <text x="550" y="191" text-anchor="middle" font-size="11" fill="#2e7d32">维护运行 (m, l, O)</text>
  <text x="550" y="222" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <text x="550" y="250" text-anchor="middle" font-size="12" fill="#1565c0">（循环所有 K/V tile，</text>
  <text x="550" y="268" text-anchor="middle" font-size="12" fill="#1565c0">无需写回中间矩阵）</text>
  <text x="550" y="295" text-anchor="middle" font-size="22" fill="#888">↓</text>
  <rect x="420" y="305" width="260" height="36" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="550" y="328" text-anchor="middle" font-size="12" fill="#27ae60">HBM：写 O（仅一次）</text>

  <!-- 中间对比标注 -->
  <line x1="305" y1="200" x2="415" y2="200" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="360" y="195" text-anchor="middle" font-size="11" fill="#7f8c8d">vs</text>

  <!-- 底部说明 -->
  <rect x="40" y="390" width="640" height="0" fill="none"/>
  <text x="360" y="395" text-anchor="middle" font-size="11" fill="#7f8c8d">HBM 访问量：Θ(N²d) → Θ(N²d²/M)，显存：O(N²) → O(N)</text>
</svg>