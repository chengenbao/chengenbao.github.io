<svg width="720" height="420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="420" fill="#fff"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">FlashAttention v4：算法-内核协同设计（Blackwell B200）</text>

  <!-- 非对称扩展说明 -->
  <rect x="30" y="42" width="655" height="44" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="357" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#bf360c">非对称硬件扩展：H100 → B200</text>
  <text x="357" y="78" text-anchor="middle" font-size="11" fill="#6d4c41">Tensor Core 算力 +150%（2.5×）｜HBM 带宽 +43%（1.4×）｜SRAM 持平 → 计算远快于数据供给，v3 kernel 在 B200 利用率降至 ~29%</text>

  <!-- 三个流水线深度对比 -->
  <text x="360" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">可配置流水线深度：消除 Tensor Core 等待</text>

  <!-- 双缓冲（v3，H100） -->
  <text x="80" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">双缓冲（v3，适合 H100）</text>
  <!-- Producer -->
  <text x="32" y="155" font-size="10" fill="#7b1fa2">预取</text>
  <rect x="60" y="142" width="90" height="24" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="105" y="158" text-anchor="middle" font-size="10" fill="#4a148c">K₁/V₁</text>
  <rect x="155" y="142" width="90" height="24" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="200" y="158" text-anchor="middle" font-size="10" fill="#4a148c">K₂/V₂</text>
  <!-- Consumer -->
  <text x="32" y="183" font-size="10" fill="#1565c0">计算</text>
  <rect x="110" y="170" width="90" height="24" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="155" y="186" text-anchor="middle" font-size="10" fill="#0d47a1">tile₁</text>
  <rect x="205" y="170" width="90" height="24" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="250" y="186" text-anchor="middle" font-size="10" fill="#0d47a1">tile₂</text>
  <text x="165" y="210" text-anchor="middle" font-size="10" fill="#555">✅ H100 上 gap 极小</text>

  <!-- 三缓冲（v4，B200） -->
  <text x="460" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">三缓冲（v4，适合 B200）</text>
  <!-- Producer -->
  <text x="412" y="155" font-size="10" fill="#7b1fa2">预取</text>
  <rect x="430" y="142" width="75" height="24" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="467" y="158" text-anchor="middle" font-size="10" fill="#4a148c">K₁/V₁</text>
  <rect x="508" y="142" width="75" height="24" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="545" y="158" text-anchor="middle" font-size="10" fill="#4a148c">K₂/V₂</text>
  <rect x="586" y="142" width="75" height="24" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="623" y="158" text-anchor="middle" font-size="10" fill="#4a148c">K₃/V₃</text>
  <!-- Consumer（错位2格）-->
  <text x="412" y="183" font-size="10" fill="#1565c0">计算</text>
  <rect x="508" y="170" width="75" height="24" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="545" y="186" text-anchor="middle" font-size="10" fill="#0d47a1">tile₁</text>
  <rect x="586" y="170" width="75" height="24" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="623" y="186" text-anchor="middle" font-size="10" fill="#0d47a1">tile₂</text>
  <text x="545" y="210" text-anchor="middle" font-size="10" fill="#1b5e20">✅ B200 Tensor Core 快，需更深缓冲消除 gap</text>

  <!-- 分隔线 -->
  <line x1="360" y1="100" x2="360" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 协同设计流程 -->
  <text x="360" y="242" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">算法-内核协同设计流程</text>

  <rect x="30" y="254" width="130" height="44" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="95" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">算法参数</text>
  <text x="95" y="289" text-anchor="middle" font-size="10" fill="#2e7d32">tile大小 / 循环顺序</text>

  <text x="175" y="279" text-anchor="middle" font-size="18" fill="#888">→</text>

  <rect x="190" y="254" width="140" height="44" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="260" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">内核配置</text>
  <text x="260" y="289" text-anchor="middle" font-size="10" fill="#1565c0">流水线深度 / warp分工</text>

  <text x="345" y="279" text-anchor="middle" font-size="18" fill="#888">→</text>

  <rect x="360" y="254" width="140" height="44" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="430" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">硬件约束</text>
  <text x="430" y="289" text-anchor="middle" font-size="10" fill="#c62828">SRAM容量 / TMA带宽</text>

  <text x="515" y="279" text-anchor="middle" font-size="18" fill="#888">→</text>

  <rect x="530" y="254" width="155" height="44" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="607" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">联合优化</text>
  <text x="607" y="289" text-anchor="middle" font-size="10" fill="#e65100">最大化 Tensor Core 利用率</text>

  <!-- 性能对比 -->
  <text x="360" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">B200 性能对比</text>
  <rect x="30" y="335" width="300" height="52" rx="6" fill="#ffeaea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="180" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">v3（H100 优化 kernel 移植到 B200）</text>
  <text x="180" y="375" text-anchor="middle" font-size="11" fill="#555">~65 TFLOPs/s（利用率仅 ~29%）</text>

  <rect x="385" y="335" width="300" height="52" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="535" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">v4（协同设计，B200 原生优化）</text>
  <text x="535" y="375" text-anchor="middle" font-size="11" fill="#555">~150 TFLOPs/s（利用率 ~67%，速度 2.3×）</text>

  <text x="360" y="410" text-anchor="middle" font-size="11" fill="#7f8c8d">来源：FlashAttention-4 arXiv 2503.03978，Zadouri et al., March 2026</text>
</svg>