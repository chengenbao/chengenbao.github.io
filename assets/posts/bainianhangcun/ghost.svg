<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonlight" cx="75%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#e8e0d0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a2018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nightsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="60%" stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#3d3020"/>
    </linearGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <!-- 夜空 -->
  <rect width="800" height="500" fill="url(#nightsky)"/>
  <!-- 月光 -->
  <rect width="800" height="500" fill="url(#moonlight)"/>
  <!-- 月亮 -->
  <circle cx="620" cy="80" r="45" fill="#e8dcc8" opacity="0.15" filter="url(#blur5)"/>
  <circle cx="620" cy="80" r="32" fill="#f0e8d8" opacity="0.25" filter="url(#blur2)"/>
  <circle cx="620" cy="80" r="22" fill="#f5f0e5" opacity="0.35"/>
  <!-- 星星 -->
  <circle cx="100" cy="50" r="1.5" fill="#e8dcc8" opacity="0.6"/>
  <circle cx="250" cy="30" r="1" fill="#e8dcc8" opacity="0.5"/>
  <circle cx="450" cy="60" r="1.5" fill="#e8dcc8" opacity="0.4"/>
  <circle cx="700" cy="150" r="1" fill="#e8dcc8" opacity="0.5"/>
  <!-- 东墙 -->
  <rect x="0" y="200" width="800" height="300" fill="#3d3020"/>
  <!-- 墙砖纹理 -->
  <g stroke="#2a2018" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="230" x2="800" y2="230"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="290" x2="800" y2="290"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="380" x2="800" y2="380"/>
    <line x1="0" y1="410" x2="800" y2="410"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
  </g>
  <!-- 墙皮脱落 -->
  <path d="M300 250 Q320 240 340 255 Q330 270 308 265 Z" fill="#2a2018" opacity="0.6"/>
  <path d="M480 300 Q505 288 520 305 Q510 322 488 318 Z" fill="#2a2018" opacity="0.5"/>
  <path d="M150 330 Q170 320 185 335 Q178 350 158 345 Z" fill="#2a2018" opacity="0.4"/>
  <!-- 地面 -->
  <rect x="0" y="440" width="800" height="60" fill="#1a1008"/>
  <!-- 幽灵般的孩子们（白色透明剪影，排成一排）-->
  <g opacity="0.18" filter="url(#blur2)">
    <!-- 孩子1 -->
    <ellipse cx="120" cy="395" rx="12" ry="16" fill="#e8dcc8"/>
    <line x1="120" y1="411" x2="120" y2="440" stroke="#e8dcc8" stroke-width="8" stroke-linecap="round"/>
    <line x1="120" y1="418" x2="104" y2="433" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="418" x2="136" y2="433" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <!-- 孩子2 -->
    <ellipse cx="185" cy="390" rx="11" ry="15" fill="#e8dcc8"/>
    <line x1="185" y1="405" x2="185" y2="440" stroke="#e8dcc8" stroke-width="8" stroke-linecap="round"/>
    <line x1="185" y1="415" x2="170" y2="432" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <line x1="185" y1="415" x2="200" y2="432" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <!-- 孩子3 -->
    <ellipse cx="248" cy="393" rx="13" ry="17" fill="#e8dcc8"/>
    <line x1="248" y1="410" x2="248" y2="440" stroke="#e8dcc8" stroke-width="9" stroke-linecap="round"/>
    <line x1="248" y1="420" x2="232" y2="436" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <line x1="248" y1="420" x2="264" y2="436" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <!-- 孩子4 -->
    <ellipse cx="310" cy="392" rx="10" ry="14" fill="#e8dcc8"/>
    <line x1="310" y1="406" x2="310" y2="440" stroke="#e8dcc8" stroke-width="7" stroke-linecap="round"/>
    <line x1="310" y1="415" x2="297" y2="431" stroke="#e8dcc8" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="310" y1="415" x2="323" y2="431" stroke="#e8dcc8" stroke-width="3.5" stroke-linecap="round"/>
    <!-- 孩子5 -->
    <ellipse cx="370" cy="394" rx="12" ry="16" fill="#e8dcc8"/>
    <line x1="370" y1="410" x2="370" y2="440" stroke="#e8dcc8" stroke-width="8" stroke-linecap="round"/>
    <line x1="370" y1="419" x2="355" y2="435" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <line x1="370" y1="419" x2="385" y2="435" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round"/>
    <!-- 孩子6 -->
    <ellipse cx="432" cy="391" rx="11" ry="15" fill="#e8dcc8"/>
    <line x1="432" y1="406" x2="432" y2="440" stroke="#e8dcc8" stroke-width="7" stroke-linecap="round"/>
    <!-- 孩子7 -->
    <ellipse cx="490" cy="393" rx="13" ry="17" fill="#e8dcc8"/>
    <line x1="490" y1="410" x2="490" y2="440" stroke="#e8dcc8" stroke-width="9" stroke-linecap="round"/>
    <!-- 孩子8 -->
    <ellipse cx="550" cy="392" rx="10" ry="14" fill="#e8dcc8"/>
    <line x1="550" y1="406" x2="550" y2="440" stroke="#e8dcc8" stroke-width="7" stroke-linecap="round"/>
    <!-- 更远/更模糊的 -->
    <ellipse cx="605" cy="395" rx="8" ry="12" fill="#e8dcc8" opacity="0.5"/>
    <line x1="605" y1="407" x2="605" y2="438" stroke="#e8dcc8" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <ellipse cx="650" cy="395" rx="7" ry="11" fill="#e8dcc8" opacity="0.4"/>
    <line x1="650" y1="406" x2="650" y2="438" stroke="#e8dcc8" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <ellipse cx="690" cy="396" rx="6" ry="10" fill="#e8dcc8" opacity="0.25"/>
    <line x1="690" y1="406" x2="690" y2="438" stroke="#e8dcc8" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  </g>
  <!-- 月光照在地面 -->
  <ellipse cx="400" cy="448" rx="300" ry="15" fill="#e8dcc8" opacity="0.06"/>
  <!-- 题字 -->
  <text x="400" y="488" text-anchor="middle" font-family="'STKaiti','KaiTi',serif" font-size="15" fill="#c8b99a" opacity="0.5" letter-spacing="3">天快亮时，东方发了一线白</text>
</svg>