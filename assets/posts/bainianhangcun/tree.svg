<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d4c5a9"/>
      <stop offset="60%" stop-color="#b8a88a"/>
      <stop offset="100%" stop-color="#8b7355"/>
    </radialGradient>
    <filter id="fog">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="screen" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="atop"/>
    </filter>
  </defs>
  <!-- 天空 -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- 远山 -->
  <ellipse cx="200" cy="350" rx="280" ry="120" fill="#9e8c70" opacity="0.5"/>
  <ellipse cx="600" cy="370" rx="250" ry="100" fill="#8b7a60" opacity="0.4"/>
  <!-- 雾气 -->
  <rect x="0" y="360" width="800" height="140" fill="#c8b99a" opacity="0.6"/>
  <ellipse cx="400" cy="380" rx="500" ry="60" fill="#d4c5a9" opacity="0.5"/>
  <!-- 地面 -->
  <rect x="0" y="420" width="800" height="80" fill="#6b5d4a"/>
  <!-- 荒草 -->
  <g fill="#4a3d2e" opacity="0.7">
    <line x1="50" y1="420" x2="45" y2="390" stroke="#4a3d2e" stroke-width="1.5"/>
    <line x1="80" y1="420" x2="88" y2="385" stroke="#4a3d2e" stroke-width="1.5"/>
    <line x1="120" y1="420" x2="115" y2="395" stroke="#5a4d3e" stroke-width="1"/>
    <line x1="700" y1="420" x2="695" y2="390" stroke="#4a3d2e" stroke-width="1.5"/>
    <line x1="730" y1="420" x2="738" y2="388" stroke="#4a3d2e" stroke-width="1.5"/>
    <line x1="760" y1="420" x2="755" y2="395" stroke="#5a4d3e" stroke-width="1"/>
    <line x1="150" y1="420" x2="145" y2="400" stroke="#4a3d2e" stroke-width="1"/>
    <line x1="660" y1="420" x2="668" y2="402" stroke="#4a3d2e" stroke-width="1"/>
  </g>
  <!-- 皂角树主干 -->
  <path d="M380 500 L385 400 L378 320 L372 240 L368 180" stroke="#2c1f0e" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M385 400 L370 480" stroke="#2c1f0e" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- 树干裂纹 -->
  <path d="M381 350 L374 330 M383 390 L376 370 M380 310 L373 295" stroke="#1a1008" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- 主枝 -->
  <path d="M372 240 L320 190 L290 150" stroke="#2c1f0e" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M370 210 L430 160 L460 120" stroke="#2c1f0e" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M368 180 L340 130 L320 90" stroke="#2c1f0e" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M368 180 L400 130 L420 80" stroke="#2c1f0e" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- 小枝 -->
  <path d="M320 190 L300 165 M290 150 L270 130 L265 110" stroke="#2c1f0e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M430 160 L450 140 M460 120 L480 100 L490 80" stroke="#2c1f0e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M340 130 L325 108 M320 90 L310 70" stroke="#2c1f0e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M400 130 L415 110 M420 80 L435 58" stroke="#2c1f0e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- 稀疏叶子（冬天或枯树感） -->
  <g fill="#3d2e1a" opacity="0.6">
    <ellipse cx="280" cy="128" rx="18" ry="10" transform="rotate(-20,280,128)"/>
    <ellipse cx="265" cy="108" rx="14" ry="8" transform="rotate(15,265,108)"/>
    <ellipse cx="488" cy="78" rx="16" ry="9" transform="rotate(25,488,78)"/>
    <ellipse cx="308" cy="68" rx="12" ry="7" transform="rotate(-10,308,68)"/>
    <ellipse cx="436" cy="55" rx="13" ry="7" transform="rotate(20,436,55)"/>
  </g>
  <!-- 文字题字 -->
  <text x="80" y="460" font-family="'STKaiti','KaiTi',serif" font-size="18" fill="#c8b99a" opacity="0.8">陈家洼·村口皂角树</text>
  <!-- 月光效果 -->
  <ellipse cx="680" cy="80" rx="45" ry="45" fill="#e8dcc8" opacity="0.3"/>
  <ellipse cx="680" cy="80" rx="30" ry="30" fill="#f0e8d8" opacity="0.4"/>
</svg>